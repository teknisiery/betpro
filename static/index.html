<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Taruhan Sepak Bola</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: auto; }
        .upload-section { margin-bottom: 20px; border: 1px solid #ccc; padding: 15px; border-radius: 10px; }
        .row { display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        .box { width: 40%; padding: 20px; text-align: center; border: 2px solid #aaa; border-radius: 10px; margin: 0 10px; font-weight: bold; position: relative; }
        .middle { width: 20%; text-align: center; font-size: 24px; }
        .green { background-color: #4CAF50; color: white; }
        button { padding: 10px 20px; margin: 5px; }
        input[type="file"] { margin: 10px 0; }
        .error { color: red; }
        .status { font-size: 24px; position: absolute; top: 5px; right: 10px; }
        .score-inputs { display: flex; justify-content: center; gap: 10px; margin: 10px 0; }
        .score-inputs input { width: 60px; padding: 5px; }
        .profit { font-size: 18px; margin-top: 10px; }
        .positive { color: green; }
        .negative { color: red; }
        .history-list { list-style: none; padding: 0; }
        .history-item { border-bottom: 1px solid #eee; padding: 5px 0; }
    </style>
</head>
<body>
    <h1>⚽ Rekomendasi Taruhan</h1>

    <div class="upload-section">
        <h3>Upload File ZIP (berisi 9 file CSV)</h3>
        <input type="file" id="zipFile" accept=".zip"><br>
        <button onclick="getRecommendation()">🔍 Dapatkan Rekomendasi</button>
        <p id="status"></p>
        <p id="error" class="error"></p>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="row">
            <div class="box" id="homeBox">HOME<span class="status" id="ahStatus"></span></div>
            <div class="middle"><span id="ahValue"></span></div>
            <div class="box" id="awayBox">AWAY<span class="status" id="awayStatus"></span></div>
        </div>
        <div class="row">
            <div class="box" id="overBox">OVER<span class="status" id="overStatus"></span></div>
            <div class="middle"><span id="ouValue"></span></div>
            <div class="box" id="underBox">UNDER<span class="status" id="underStatus"></span></div>
        </div>
        <div class="row">
            <div class="box" id="bttsBox">BTTS<span class="status" id="bttsStatus"></span></div>
            <div class="box" id="overHtBox">OVER HT<span class="status" id="htStatus"></span></div>
        </div>

        <div class="upload-section">
            <h3>Masukkan Hasil Aktual (Skor)</h3>
            <div class="score-inputs">
                <label>HT Home: <input type="number" id="htHome" min="0" value="0"></label>
                <label>HT Away: <input type="number" id="htAway" min="0" value="0"></label>
                <label>FT Home: <input type="number" id="ftHome" min="0" value="0"></label>
                <label>FT Away: <input type="number" id="ftAway" min="0" value="0"></label>
            </div>
            <button onclick="sendFeedback()">📤 Simpan & Latih Ulang</button>
            <p id="feedbackStatus"></p>
            <div id="profitDisplay" class="profit"></div>
            <div id="historyDisplay"></div>
        </div>
    </div>

    <script>
        let lastFeatures = null;
        let lastPrediction = null;

        async function getRecommendation() {
            const fileInput = document.getElementById('zipFile');
            const file = fileInput.files[0];
            if (!file) { alert("Pilih file ZIP terlebih dahulu."); return; }
            const formData = new FormData();
            formData.append('zip_file', file);

            document.getElementById('status').innerText = "Memproses...";
            document.getElementById('error').innerText = "";
            try {
                const resp = await fetch('/predict', { method: 'POST', body: formData });
                const data = await resp.json();
                if (data.error) {
                    document.getElementById('error').innerText = "Error: " + data.error;
                    document.getElementById('status').innerText = "";
                    return;
                }

                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('ahValue').innerText = data.ah;
                document.getElementById('ouValue').innerText = data.ou;

                ['homeBox','awayBox','overBox','underBox','bttsBox','overHtBox'].forEach(id => {
                    document.getElementById(id).classList.remove('green');
                });
                ['ahStatus','awayStatus','overStatus','underStatus','bttsStatus','htStatus'].forEach(id => {
                    document.getElementById(id).innerText = '';
                });

                if (data.ah_choice === 'home') {
                    document.getElementById('homeBox').classList.add('green');
                } else {
                    document.getElementById('awayBox').classList.add('green');
                }
                if (data.ou_choice === 'over') {
                    document.getElementById('overBox').classList.add('green');
                } else {
                    document.getElementById('underBox').classList.add('green');
                }
                if (data.btts) document.getElementById('bttsBox').classList.add('green');
                if (data.over_ht) document.getElementById('overHtBox').classList.add('green');

                lastFeatures = data.features;
                lastPrediction = {
                    ah_choice: data.ah_choice,
                    ou_choice: data.ou_choice,
                    btts: data.btts,
                    over_ht: data.over_ht,
                    home_team: data.home_team,
                    away_team: data.away_team,
                    match_date: data.match_date
                };
                document.getElementById('status').innerText = "";
                document.getElementById('profitDisplay').innerHTML = "";
            } catch (err) {
                document.getElementById('error').innerText = "Gagal menghubungi server: " + err.message;
                document.getElementById('status').innerText = "";
            }
        }

        async function sendFeedback() {
            if (!lastFeatures || !lastPrediction) { alert("Dapatkan rekomendasi dulu."); return; }
            const formData = new FormData();
            formData.append('ht_home', document.getElementById('htHome').value);
            formData.append('ht_away', document.getElementById('htAway').value);
            formData.append('ft_home', document.getElementById('ftHome').value);
            formData.append('ft_away', document.getElementById('ftAway').value);
            formData.append('features_json', JSON.stringify(lastFeatures));

            try {
                const resp = await fetch('/feedback', { method: 'POST', body: formData });
                const data = await resp.json();

                // Validasi status
                const predAH = lastPrediction.ah_choice;
                const actualAH = data.actual_ah;
                const ahOk = (predAH === actualAH) && actualAH !== 'push';
                document.getElementById('ahStatus').innerText = actualAH === 'push' ? '↔️' : (ahOk ? '✅' : '❌');

                const predOU = lastPrediction.ou_choice;
                const actualOU = data.actual_ou;
                const ouOk = (predOU === actualOU) && actualOU !== 'push';
                document.getElementById('overStatus').innerText = (predOU === 'over') ? (actualOU === 'push' ? '↔️' : (ouOk ? '✅' : '❌')) : '';
                document.getElementById('underStatus').innerText = (predOU === 'under') ? (actualOU === 'push' ? '↔️' : (ouOk ? '✅' : '❌')) : '';

                document.getElementById('bttsStatus').innerText = lastPrediction.btts === Boolean(data.actual_btts) ? '✅' : '❌';
                document.getElementById('htStatus').innerText = lastPrediction.over_ht === Boolean(data.actual_over_ht) ? '✅' : '❌';

                const profit = data.profit;
                const totalColor = profit.total >= 0 ? 'positive' : 'negative';
                document.getElementById('profitDisplay').innerHTML = `
                    <strong>Profit Pertandingan Ini:</strong><br>
                    AH: ${profit.ah.toFixed(2)} | OU: ${profit.ou.toFixed(2)} | BTTS: ${profit.btts.toFixed(2)} | HT: ${profit.over_ht.toFixed(2)}<br>
                    <span class="${totalColor}">Total: ${profit.total.toFixed(2)} unit</span><br>
                    <strong>Akumulasi Total: ${data.total_accumulated.toFixed(2)} unit</strong>
                `;

                // Riwayat
                if (data.history && data.history.length > 0) {
                    let html = '<h4>Riwayat Terakhir:</h4><ul class="history-list">';
                    data.history.forEach(item => {
                        html += `<li class="history-item">${item.home} ${item.score} ${item.away} : ${item.total_profit.toFixed(2)} unit</li>`;
                    });
                    html += '</ul>';
                    document.getElementById('historyDisplay').innerHTML = html;
                }

                document.getElementById('feedbackStatus').innerText = data.message;
            } catch (err) {
                document.getElementById('feedbackStatus').innerText = "Gagal mengirim feedback.";
            }
        }
    </script>
</body>
    </html>
